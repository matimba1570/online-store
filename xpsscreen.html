

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dell Batteries</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .battery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    .battery-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .battery-card img {
      max-width: 100%;
      height: auto;
      margin-bottom: 10px;
    }
    .add-to-cart {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background-color: #28a745;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .add-to-cart:hover {
      background-color: #1e7e34;
    }
  </style>
  <script>
    function addToCart(model) {
      alert(model + " has been added to your cart!");
      // Here you would integrate with your cart system
    }
  </script>
</head>
<body>
  <h1>Dell XPS Screens Models</h1>
  
  <div class="battery-grid">
    <div class="battery-card">
      <img src="battery1.jpg" alt="Dell Battery Model 1">
      <p>Dell XPS 16 baorderless</p>
      <P> 16.3 inch 3.2k IPS(WVA)1920X1200touch panel with 30-120Hz.                 </P>
      <P> E1500.00                 </P>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 1')">Add to Cart</button>
    </div>
    <div class="battery-card">
      <img src="battery2.jpg" alt="Dell Battery Model 2">
      <p>Dell XPS 14 boarderless</p>
      <P>                  </P>
      <P>E1500.00</P>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 2')">Add to Cart</button>
    </div>
    <div class="battery-card">
      <img src="battery3.jpg" alt="Dell Battery Model 3">
      <p>Dell XPS 13</p>
      <P> 13.3inch ,1920x1200(FHD+)ISP LCD 60Hz           </P>
      <P>E 450.00</P>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 3')">Add to Cart</button>
    </div>
    <div class="battery-card">
      <img src="battery4.jpg" alt="Dell Battery Model 4">
      <p>Dell Battery Mo 4</p>
      <P>                </P>
      <P>      </P>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 4')">Add to Cart</button>
    </div>
    <div class="battery-card">
      <img src="battery5.jpg" alt="Dell Battery Model 5">
      <p>Dell Battery Model 5</p>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 5')">Add to Cart</button>
    </div>
    <div class="battery-card">
      <img src="battery6.jpg" alt="Dell Battery Model 6">
      <p>Dell Battery Model 6</p>
      <button class="add-to-cart" onclick="addToCart('Dell Battery Model 6')">Add to Cart</button>
    </div>
  </div>
</body>
</html>
